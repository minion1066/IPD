#*******************************************************************************
# FORGE Primary Code Container Deployment
# 
# Purpose:  Deploy the FORGE research code container for running IPD experiments
# Usage:    ./forge-shell.sh (see forge-shell.sh for interactive use)
#
# Ref: https://kubernetes.io/docs/concepts/workloads/pods/
#
# This container is OPTIONAL. Researchers who prefer to develop and modify
# the game code should clone the repo and run from a virtual environment.
# This container provides a ready-to-run environment for those who just
# want to execute experiments without local setup.
#
# Author:
#   Emily D. Carpenter
#   Anderson College of Business and Computing, Regis University
#   MSDS 696/S71: Data Science Practicum II
#   Dr. Douglas Hart, Dr. Kellen Sorauf
#   Practicum II, February-May 2026
#*******************************************************************************

---
apiVersion: v1
kind: Pod
metadata:
  name: forge-${FORGE_USER}
  labels:
    app: forge
    user: ${FORGE_USER}
spec:
  hostname: forge-code
  nodeSelector:
    kubernetes.io/hostname: platinum
  containers:
    - name: forge
      image: ghcr.io/regis-university-data-science/forge-code:main
      imagePullPolicy: Always
      stdin: true
      tty: true
      env:
        - name: FORGE_USER
          value: "${FORGE_USER}"
        - name: FORGE_UID
          value: "${FORGE_UID}"          
        - name: FORGE_DB_HOST
          value: "forge-db"
        - name: FORGE_DB_USER
          value: "postgres"
        - name: OLLAMA_HOST_0
          value: "ollama-tungsten"
        - name: OLLAMA_HOST_1
          value: "ollama-tungsten"
        - name: OLLAMA_PORT
          value: "11434"
      volumeMounts:
        - name: results
          mountPath: /app/results
  volumes:
    - name: results
      hostPath:
        path: /home/${FORGE_USER}/forge-results
        type: DirectoryOrCreate